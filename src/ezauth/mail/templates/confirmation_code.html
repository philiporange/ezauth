<tr>
    <td class="wrapper">
        <table role="presentation" border="0" cellpadding="0" cellspacing="0">
            <tr>
                <td>
                    <p>Hi {{{ name }}},</p>
                    <p>Use this code to continue:</p>

                    <div class="code-block">
                        <div class="code-value">{{{ confirmation_code }}}</div>
                    </div>

                    <p class="text-muted" style="text-align: center;">This code expires in 1 hour.</p>

                    <hr />

                    <p class="text-muted">If you didn't request this code, you can safely ignore this email. Someone may have entered your address by mistake.</p>
                </td>
            </tr>
        </table>
    </td>
</tr>
