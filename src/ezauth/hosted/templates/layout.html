<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sign In{% endblock %} — {{ app_name }}</title>
    <link rel="stylesheet" href="/auth/static/hosted.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>{{ app_name }}</h1>
                {% block header_subtitle %}{% endblock %}
            </div>
            {% block content %}{% endblock %}
        </div>
        <div class="powered-by">
            Secured by <a href="https://ezauth.org">EZAuth</a>
        </div>
    </div>
</body>
</html>
