{% extends "layout.html" %}
{% block title %}Tenants - EZAuth{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Tenants</h2>
    <a href="/dashboard/tenants/new" class="btn btn-primary">New Tenant</a>
</div>
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>ID</th>
            <th>Created</th>
        </tr>
    </thead>
    <tbody>
        {% for t in tenants %}
        <tr>
            <td><a href="/dashboard/tenants/{{ t.id }}">{{ t.name }}</a></td>
            <td class="mono">{{ t.id }}</td>
            <td>{{ t.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
